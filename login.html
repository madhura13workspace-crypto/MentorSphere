<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Peer Mentor Portal</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <div class="navbar">
    <div class="logo">MentorSphere</div>
  </div>

  <div class="welcome-container fade-up">
    <h1 class="welcome-title">Login to Peer Mentor Portal 🌟</h1>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Enter Email" required />
      <input type="password" id="password" placeholder="Enter Password" required />
      <button type="submit" class="login-signup-btn">Login</button>
    </form>

    <p style="margin-top: 15px; color:#c8d5ff;">
      Don't have an account? 
      <a href="signup.html" style="color:#64d1ff;">Create Account</a>
    </p>
  </div>

  <footer>
    © 2025 Peer Mentor Support Portal | Made for Students 💙
  </footer>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA7AVBnd9raULfBcQQLx0iHCTkkLRQrWkI",
      authDomain: "mentorsphere-zeal.firebaseapp.com",
      projectId: "mentorsphere-zeal",
      storageBucket: "mentorsphere-zeal.appspot.com",
      messagingSenderId: "292322652558",
      appId: "1:292322652558:web:3132884fd1eb10c444b4df"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        // Sign in with Firebase Auth
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Get user role from Firestore
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const data = docSnap.data();
          if (data.role === "Mentee") {
            window.location.href = "mentee.html";
          } else if (data.role === "Mentor") {
            window.location.href = "mentor.html";
          } else {
            alert("Role not assigned. Contact admin.");
          }
        } else {
          alert("No user data found. Contact admin.");
        }

      } catch (error) {
        console.error(error);
        alert("Error: " + error.message);
      }
    });
  </script>
</body>
</html>
