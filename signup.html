<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <div class="welcome-container">
    <h2 class="welcome-title">Signup</h2>
    <form id="signupForm">
      <select id="role" required>
        <option value="">Select Role</option>
        <option value="Mentee">Mentee</option>
        <option value="Mentor">Mentor</option>
      </select>

      <input type="text" id="name" placeholder="Full Name" required>
      <input type="text" id="dept" placeholder="Department" required>
      <select id="year" required>
        <option value="">Select Year</option>
        <option value="1">1st</option>
        <option value="2">2nd</option>
        <option value="3">3rd</option>
        <option value="4">4th</option>
      </select>

      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>

      <button type="submit" class="login-signup-btn">Register</button>
    </form>
  </div>

  <footer>MentorSphere © 2025</footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA7AVBnd9raULfBcQQLx0iHCTkkLRQrWkI",
      authDomain: "mentorsphere-zeal.firebaseapp.com",
      projectId: "mentorsphere-zeal",
      storageBucket: "mentorsphere-zeal.appspot.com",
      messagingSenderId: "292322652558",
      appId: "1:292322652558:web:3132884fd1eb10c444b4df"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const signupForm = document.getElementById('signupForm');
    signupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          alert("Account Created Successfully!");
          window.location.href = "login.html";
        })
        .catch(err => alert("Error: " + err.message));
    });
  </script>
</body>
</html>
