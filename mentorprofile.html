<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentor Profile | Peer Mentor Portal</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .profile-container-main {
      max-width: 500px;
      margin: 50px auto;
      background: rgba(15, 22, 50, 0.85);
      padding: 30px;
      border-radius: 20px;
      text-align: left;
      box-shadow: 0 0 20px rgba(0, 200, 255, 0.2);
    }
    .profile-container-main h2 { color: #88c5ff; text-align: center; margin-bottom: 25px; font-size: 1.8rem; }
    .profile-container-main label { display: block; margin: 10px 0 5px; color: #c7d4ff; font-size: 0.95rem; }
    .profile-container-main input, .profile-container-main select {
      width: 100%; padding: 12px; border-radius: 10px; background: rgba(10,15,40,0.9);
      border: 1px solid #1c2a55; color: #e5e9ff; font-size: 1rem; margin-bottom: 15px; outline: none;
      box-shadow: 0 0 12px rgba(0, 200, 255, 0.15);
    }
    .profile-container-main input:focus, .profile-container-main select:focus { border-color: #00baff; box-shadow: 0 0 20px #00baff; }
    .photo-upload { text-align: center; margin-bottom: 15px; }
    .photo-upload img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid #00baff; }
    .save-btn { width: 100%; padding: 15px; font-size: 1.2rem; border-radius: 50px; background: linear-gradient(90deg, #00c8ff, #006eff);
      color: #fff; font-weight: 700; cursor: pointer; border: none; box-shadow: 0 0 20px #00baff, 0 0 50px #007bff; transition: 0.3s;
    }
    .save-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 0 30px #64d1ff, 0 0 70px #00e5ff; }
  </style>
</head>
<body>

  <div class="navbar">
    <button class="nav-menu-btn" id="menu-btn">&#9776;</button>
    <div class="logo">MentorSphere</div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="profile-container">
      <button class="sidebar-btn profile-btn">👤</button>
      <p>Profile</p>
    </div>
    <button class="sidebar-btn" onclick="window.location.href='mentor.html'">Dashboard</button>
    <button class="sidebar-btn" onclick="logout()">Logout</button>
  </div>

  <div class="profile-container-main">
    <h2>Mentor Profile</h2>
    <form id="profileForm">
      <div class="photo-upload">
        <img id="profilePicPreview" src="default-profile.png" alt="Profile Photo">
        <input type="file" id="profilePic" accept="image/*">
      </div>
      <label for="name">Full Name:</label>
      <input type="text" id="name" placeholder="Enter Full Name" required />
      <label for="dept">Department:</label>
      <select id="dept" required>
        <option value="">Select Department</option>
        <option value="IT">IT</option>
        <option value="CSE">CSE</option>
        <option value="ECE">ECE</option>
        <option value="ME">ME</option>
        <option value="CE">CE</option>
      </select>
      <label for="year">Year:</label>
      <select id="year" required>
        <option value="">Select Year</option>
        <option value="1st">1st</option>
        <option value="2nd">2nd</option>
        <option value="3rd">3rd</option>
        <option value="4th">4th</option>
      </select>
      <label for="username">Username:</label>
      <input type="text" id="username" readonly />
      <button type="submit" class="save-btn">Save Profile</button>
    </form>
  </div>

  <footer>© 2025 Peer Mentor Support Portal | Made for Students 💙</footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA7AVBnd9raULfBcQQLx0iHCTkkLRQrWkI",
      authDomain: "mentorsphere-zeal.firebaseapp.com",
      projectId: "mentorsphere-zeal",
      storageBucket: "mentorsphere-zeal.appspot.com",
      messagingSenderId: "292322652558",
      appId: "1:292322652558:web:3132884fd1eb10c444b4df"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const menuBtn = document.getElementById('menu-btn');
    const sidebar = document.getElementById('sidebar');
    const profilePicInput = document.getElementById('profilePic');
    const profilePicPreview = document.getElementById('profilePicPreview');
    const profileForm = document.getElementById('profileForm');

    menuBtn.addEventListener('click', () => sidebar.classList.toggle('active'));
    document.addEventListener('click', e => { if(!sidebar.contains(e.target) && !menuBtn.contains(e.target)) sidebar.classList.remove('active'); });
    profilePicInput.addEventListener('change', e => { const file = e.target.files[0]; if(file) profilePicPreview.src = URL.createObjectURL(file); });

    function logout() { signOut(auth).then(() => { window.location.href = 'login.html'; }); }

    onAuthStateChanged(auth, async (user) => {
      if(user){
        document.getElementById('username').value = user.email.split('@')[0];

        const profileRef = doc(db, "users", user.uid);
        const profileSnap = await getDoc(profileRef);

        if(profileSnap.exists()){
          const data = profileSnap.data();
          document.getElementById('name').value = data.name || '';
          document.getElementById('dept').value = data.dept || '';
          document.getElementById('year').value = data.year || '';
          if(data.photo) profilePicPreview.src = data.photo;
        }

      } else {
        window.location.href = 'login.html';
      }
    });

    profileForm.addEventListener('submit', async e => {
      e.preventDefault();
      const user = auth.currentUser;
      if(!user) return alert("User not logged in!");

      const profileData = {
        name: document.getElementById('name').value,
        dept: document.getElementById('dept').value,
        year: document.getElementById('year').value,
        username: document.getElementById('username').value,
        photo: profilePicPreview.src
      };

      await setDoc(doc(db, "users", user.uid), profileData, { merge: true });
      alert("Profile saved successfully!");
      window.location.href = 'mentor.html';
    });
  </script>
</body>
</html>
